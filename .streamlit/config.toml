[theme]
# Modern, professional color scheme
primaryColor = "#0d6efd"
backgroundColor = "#ffffff"
secondaryBackgroundColor = "#f8f9fa"
textColor = "#212529"
font = "sans serif"

[client]
# Show detailed error messages for debugging
showErrorDetails = true

[logger]
level = "info"

[server]
# Enable CSRF protection
enableXsrfProtection = true
